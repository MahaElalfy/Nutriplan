<script>
const { useState } = React;

const C = {
  teal:"#1B6B6B",tealMid:"#2A8F8F",tealLt:"#E4F4F4",
  sage:"#4A9B7F",sageLt:"#EAF5F0",
  amber:"#E8A23A",amberLt:"#FEF6E7",
  slate:"#3D4F5C",ink:"#1C2B33",
  mist:"#F4F9F8",white:"#FFFFFF",border:"#D6E8E5",
  red:"#C0392B",redLt:"#FDECEA",
  purple:"#7B6ED6",blue:"#2980B9",orange:"#E67E22",
};




// ── Pediatric Growth References (WHO + CDC + Fenton) ──────────────
// WHO BMI-for-age z-score reference: median (M) and approx SD by age (years)
const WHO_BMI_REF={
  boys:{2:[16.0,1.5],3:[15.6,1.4],4:[15.3,1.3],5:[15.3,1.3],6:[15.3,1.4],7:[15.5,1.5],8:[15.7,1.7],9:[16.0,1.9],10:[16.4,2.1],11:[16.9,2.3],12:[17.5,2.5],13:[18.2,2.7],14:[19.0,2.8],15:[19.8,2.9],16:[20.5,3.0],17:[21.1,3.0],18:[21.7,3.1],19:[22.1,3.1]},
  girls:{2:[15.7,1.4],3:[15.4,1.4],4:[15.3,1.4],5:[15.2,1.4],6:[15.3,1.5],7:[15.5,1.7],8:[15.8,1.9],9:[16.3,2.1],10:[16.9,2.3],11:[17.5,2.5],12:[18.3,2.6],13:[19.0,2.7],14:[19.6,2.8],15:[20.2,2.8],16:[20.6,2.9],17:[20.9,2.9],18:[21.0,3.0],19:[21.1,3.0]},
};
function pedGrowthStatus(bmi,age,gender){
  const a=Math.round(parseFloat(age));
  const g=(gender==="Female")?"girls":"boys";
  const ref=WHO_BMI_REF[g];
  if(!ref[a]||!bmi) return null;
  const [M,SD]=ref[a];
  const z=((parseFloat(bmi)-M)/SD);
  let label,color,std;
  // WHO 5-19 cutoffs (BMI-for-age z)
  if(a>=5){
    if(z<-3){label="Severe thinness";color="#C0392B";}
    else if(z<-2){label="Thinness";color="#E67E22";}
    else if(z<=1){label="Normal";color="#4A9B7F";}
    else if(z<=2){label="Overweight";color="#E8A23A";}
    else{label="Obese";color="#C0392B";}
    std="WHO 5–19y";
  }else{
    // WHO 0-5 weight-for-height style cutoffs (approx via BMI-for-age)
    if(z<-3){label="Severely wasted";color="#C0392B";}
    else if(z<-2){label="Wasted";color="#E67E22";}
    else if(z<=2){label="Normal";color="#4A9B7F";}
    else if(z<=3){label="Risk of overweight";color="#E8A23A";}
    else{label="Overweight/Obese";color="#C0392B";}
    std=(a<2)?"WHO 0–2y":"WHO 2–5y";
  }

function bmi(w,h){const hm=parseFloat(h)/100,wk=parseFloat(w);return(!hm||!wk)?"":(wk/(hm*hm)).toFixed(1);}
function bmiLabel(b){
  const n=parseFloat(b);
  if(!n) return "";
  if(n<18.5) return "Underweight";
  if(n<25)   return "Normal";
  if(n<30)   return "Overweight";
  if(n<35)   return "Obese I";
  if(n<40)   return "Obese II";
  return "Obese III";
}
function ree(w,h,age,gender){
  const wk=parseFloat(w),hcm=parseFloat(h),a=parseFloat(age)||30;
  if(!wk||!hcm) return 0;
  const f=gender==="Female";
  if(a<18){
    if(f) return a<3?16.252*wk+10.232*(hcm/100)*100-413.5:a<10?16.969*wk+1.618*hcm+371.2:8.365*wk+4.65*hcm+200;
    return a<3?0.167*wk+15.174*hcm-617.6:a<10?19.59*wk+1.303*hcm+414.9:16.25*wk+1.372*hcm+515.5;
  }
  return f?10*wk+6.25*hcm-5*a-161:10*wk+6.25*hcm-5*a+5;
}

          React.createElement(Btn,{label:ar?"🔄 إعادة إنشاء":"🔄 Regenerate",onClick:generate,small:true})
        ),
        loading&&step<4&&React.createElement("div",{style:{textAlign:"center",padding:"16px 0",fontSize:13,color:C.slate}},"🤖 Analysing patient data and crafting personalised plan…")
      )
    ),
    React.createElement("style",null,"@keyframes spin{to{transform:rotate(360deg);}}")
  );
}

</script>
<script>try{ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));}catch(e){document.getElementById('root').innerHTML='<div style="padding:30px;color:red;font-family:monospace;white-space:pre-wrap"><h2>Error</h2>'+e.message+'\n'+e.stack+'</div>';}</script>
